<!DOCTYPE html>
<html>
<head>
    <title>Traffic Control</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; text-align: center; padding-top: 50px; }
        .btn { padding: 20px 40px; margin: 10px; font-size: 18px; cursor: pointer; border: none; border-radius: 8px; font-weight: bold; transition: 0.3s; }
        .walk { background: #e74c3c; color: white; }
        .dance { background: #2ecc71; color: white; }
        .btn:hover { opacity: 0.8; transform: scale(1.05); }
    </style>
</head>
<body>
    <h1>Infrastructure Control Hub</h1>
    <p>Status: <span style="color: #2ecc71;">SYSTEM ONLINE</span></p>
    
    <button class="btn walk" onclick="fetch('/api/walk')">TRIGGER WALK SIGNAL</button>
    <button class="btn dance" onclick="fetch('/api/dance')">START SYSTEM DIAGNOSTIC (MORSE)</button>

    <script>
        // This script talks to your Python backend without refreshing the page
        console.log("Dashboard Loaded");
    </script>
</body>
</html>
